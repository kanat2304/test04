<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему тестирования</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { display: flex; align-items: center; min-height: 100vh; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-5">
                    <h3 class="text-center mb-3 fw-bold">Тестирование</h3>
                    <h5 class="text-center mb-4" style="color: #764ba2;">{{ test.name }}</h5>
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label text-muted">Имя и Фамилия</label>
                            <input type="text" name="student_name" class="form-control form-control-lg" placeholder="Иван Иванов" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted">Группа</label>
                            <input type="text" name="group" class="form-control form-control-lg" placeholder="ПО-21" required>
                        </div>
                        <button type="submit" class="btn btn-success btn-lg w-100 mt-2 fw-bold">Начать тест</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
